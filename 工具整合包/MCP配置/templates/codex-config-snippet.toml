[mcp_servers.cczmodstudio]
command = 'powershell.exe'
args = [
  '-NoLogo',
  '-NoProfile',
  '-ExecutionPolicy',
  'Bypass',
  '-File',
  '<TOOL_ROOT>\MCP配置\start-ccz-mcp.ps1',
  '-GameRoot',
  '<GAME_ROOT>'
]
startup_timeout_sec = 120

[mcp_servers.cczmodstudio.env]
CCZMODSTUDIO_TOOL_ROOT = '<TOOL_ROOT>'
CCZMODSTUDIO_GAME_ROOT = '<GAME_ROOT>'
